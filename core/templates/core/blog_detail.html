{% extends "base.html" %}

{% block title %}{{ post.title }} | Let’s Go Foraging{% endblock %}

{% block content %}
<article>
    <p>
        <a href="{% url 'blog_list' %}">&larr; Back to Field Notes</a>
    </p>

    <h1>{{ post.title }}</h1>

    <p>
        <strong>Published:</strong>
        {{ post.published_date|date:"j F Y" }}
    </p>

    <p>{{ post.excerpt }}</p>

    <section>
        {{ post.body|linebreaks }}
    </section>
</article>
{% endblock %}
